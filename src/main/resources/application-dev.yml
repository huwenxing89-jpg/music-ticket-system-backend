# 开发环境配置
spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/music_ticket_system?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: 123456

  # Redis配置（暂时禁用，生产环境请启用）
  # redis:
  #   host: localhost
  #   port: 6379
  #   password:
  #   database: 0
  #   timeout: 10000ms
  #   lettuce:
  #     pool:
  #       min-idle: 0
  #       max-idle: 8
  #       max-active: 8
  #       max-wait: -1ms
  # 缓存配置（禁用Redis缓存）
  cache:
    type: none

  # 文件上传配置
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

# 文件上传路径配置
file:
  upload-path: D:/upload/music-ticket-system
  access-url: /files

# 日志配置
logging:
  level:
    com.music: debug
    org.springframework: info
